<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Violet</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../02_CSS/04_login.css">
</head>
<body>

  <!-- Floating orbs background -->
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <main class="container">

    <!-- Left panel -->
    <aside class="panel-left">

      <div class="panel-copy">
        <h1 class="headline">Welcome.</h1>
        <p class="sub">가장 가까운 충전소<br/>가장 편한 시간.</p>
      </div>
      <div class="panel-deco">
        <div class="deco-ring ring-1"></div>
        <div class="deco-ring ring-2"></div>
        <div class="deco-ring ring-3"></div>
      </div>
    </aside>

    <!-- Right panel: Login form -->
    <section class="panel-right">
      <div class="form-card" id="formCard">
        <div class="form-header">
          <h2 class="form-title">로그인</h2>
          <p class="form-subtitle">계정에 접속하세요</p>
        </div>
        <form id="loginForm" novalidate>

          <div class="field" id="fieldEmail">
            <label for="email">이메일</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 7L12 13 3 7V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2z"/><path d="M3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
              </svg>
              <input type="email" id="email" name="email" placeholder="hello@example.com" autocomplete="email" />
            </div>
            <span class="error-msg" id="emailError"></span>
          </div>

          <div class="field" id="fieldPassword">
            <label for="password">비밀번호</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="비밀번호 보기">
                <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="error-msg" id="passwordError"></span>
          </div>

          <div class="options-row">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" />
              <span class="checkmark"></span>
              로그인 유지
            </label>
            <a href="#" class="forgot">비밀번호 찾기</a>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">로그인</span>
            <div class="btn-loader" id="btnLoader"></div>
          </button>

        </form>

        <div class="divider"><span>또는</span></div>

        <div class="social-row">
          <button class="btn-social" aria-label="Google 로그인">
            <svg viewBox="0 0 24 24">
            <path fill="#EA4335" d="M5.27 9.76A7.08 7.08 0 0 1 12 4.9c1.76 0 3.35.64 4.58 1.69l3.41-3.41A12 12 0 0 0 0 12c0 2 .5 3.9 1.38 5.57l3.89-3.01z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.66-2.84A7.08 7.08 0 0 1 4.9 14.5l-3.52 2.73C3.18 21.38 7.26 24 12 24z"/><path fill="#4A90D9" d="M23.9 12.2c0-.79-.07-1.56-.2-2.3H12v4.51h6.69a5.7 5.7 0 0 1-2.48 3.74l3.66 2.84C21.95 18.84 23.9 15.78 23.9 12.2z"/><path fill="#FBBC05" d="M4.9 14.5a7.12 7.12 0 0 1 0-4.52L1.38 6.97A11.96 11.96 0 0 0 0 12c0 1.92.46 3.74 1.27 5.35l3.63-2.85z"/></svg>
            Google
          </button>

          <button class="btn-social" aria-label="GitHub 로그인">

          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <rect width="24" height="24" rx="5" fill="#03C75A"/>
  <path d="M5 17V7h2.8l3.4 5.2V7H14v10h-2.8L7.8 11.8V17H5z" fill="white"/>
</svg>
            NAVER
          </button>
        </div>

        <p class="signup-link">계정이 없으신가요? 
          <a href="#">회원가입</a></p>

      </div>
    </section>

  </main>

  <script src="../03_JS/03_login.js"></script>
</body>
</html>
