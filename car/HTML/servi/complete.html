<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>충전 신청 완료</title>
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #6d28d9, #a855f7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .complete-box {
      background: rgba(255,255,255,0.1);
      padding: 50px 40px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .home-btn {
      display: inline-block;
      padding: 14px 28px;
      background: white;
      color: #6d28d9;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="complete-box">
    <h1>충전 신청 완료 🎉</h1>
    <p>
      입금 확인 후 충전 금액이 반영됩니다.<br>
      이용해주셔서 감사합니다.
    </p>

    <a href="index.html" class="home-btn">메인으로 이동</a>
  </div>

</body>
</html>
