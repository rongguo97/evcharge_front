<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차카지(CHARCAGE) - 개인정보페이지</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="./css/mypageP.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="top-nav">
            <div class="logo">Account Settings</div>
            <nav class="menu">
                <a href="main.html"><span>메인으로</span></a>
                <a href="mypage.html"><span>마이페이지</span></a>
                <a href="welllet.html"><span  class="active">지갑 충전하기</span></a>
        </header>

        <div class="main-layout">
            <section class="hero-banner mini">
                <div class="overlay"></div>
                <div class="hero-content">
                    <h2>Account Settings</h2>
                    <p>회원님의 소중한 정보를 안전하게 관리하세요.</p>
                </div>
            </section>

            <div class="profile-container">
                <div class="glass-card profile-card">
                    <div class="profile-header">
                        <div class="avatar-large">차</div>
                        <div class="profile-title">
                            <h3>차카지 <span class="badge-gold">VIP 등급</span></h3>
                            <p>가입일: 2024.08.01</p>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <label>이메일 주소</label>
                            <div class="value">chakaji_user@example.com</div>
                        </div>
                        <div class="info-item">
                            <label>회원 고유 코드</label>
                            <div class="value">#CKJ-9982-X</div>
                        </div>
                        <div class="info-item">
                            <label>등록 차량 정보</label>
                            <div class="value">Tesla Model 3 (12가 3456)</div>
                        </div>
                        <div class="info-item">
                            <label>계정 권한</label>
                            <div class="value">회원</div>
                        </div>
                        <div class="info-item">
                            <label>현재 멤버십 등급</label>
                            <div class="value-highlight">VIP PREMIUM</div>
                        </div>
                        <div class="info-item">
                            <label>최초 가입일</label>
                            <div class="value">2024년 08월 01일</div>
                        </div>
                    </div>

                    <div class="profile-actions">
                        <button class="edit-btn">정보 수정하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
