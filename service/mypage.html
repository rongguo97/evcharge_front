<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차카지(CHARCAGE) - 마이페이지</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="../servi2/css/mypage.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="top-nav">
            <div class="logo">MyPage</div>
            <nav class="menu">
                <a href="main.html"><span>메인으로</span></a>
                <a href="mypageP.html"><span>개인정보</span></a>
                <a href="welllet.html"><span class="active">지갑 충전하기</span></a>
            </nav>
        </header>

        <div class="main-layout">
            <section class="hero-banner">
                <div class="overlay"></div>
                <div class="hero-content">
                    <h2>Ready to Charge</h2>
                    <p>환영합니다. 충전 준비가 완료되었습니다.</p>
                </div>
            </section>

            <div class="dashboard-grid">
                <div class="status-panel">
                    <div class="glass-card">
                        <span>현재 배터리</span>
                        <div class="battery-level">
                            <div class="gauge" style="width: 72%;"></div>
                            <span class="pct">72%</span>
                        </div>
                    </div>
                    <div class="glass-card">
                        <span>적립금</span>
                        <h3>0 원</h3>
                    </div>
                    <div class="glass-card">
                        <span>포인트</span>
                        <h3>20,000 P</h3>
                    </div>
                </div>

                <div class="history-panel">
                    <h3>최근 이용 리포트</h3>
                    <div class="list-item">
                        <div class="date">04.07</div>
                        <div class="info">부산 시청역 스테이션 - 12.5kWh</div>
                        <div class="price">- 3,200원</div>
                    </div>
                    <div class="list-item">
                        <div class="date">04.02</div>
                        <div class="info">해운대 LCT 스테이션 - 25.0kWh</div>
                        <div class="price">- 7,500원</div>
                    </div>
                    <div class="list-item">
                        <div class="date">03.25</div>
                        <div class="info">범내골 스테이션 - 25.0kWh</div>
                        <div class="price">- 7,500원</div>
                    </div>
                    <br>
                    <br>
                    <br>
                    <button class="more-btn">전체 내역 보기</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
